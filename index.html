    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const widget = document.querySelector('elevenlabs-convai');
            
            widget.addEventListener('elevenlabs-convai:call-tool', async (event) => {
                const { name, arguments: args, callback } = event.detail;
                
                if (name === 'web_search') {
                    const searchQuery = args.query;
                    try {
                        // Swapping to a faster, ultra-reliable edge CDN proxy network
                        const targetUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(searchQuery)}`;
                        const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                        const htmlText = await response.text();
                        
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlText, 'text/html');
                        const snippets = Array.from(doc.querySelectorAll('.result__snippet'))
                                              .slice(0, 3)
                                              .map(el => el.textContent.trim())
                                              .join(' ');
                        
                        callback({ success: true, result: snippets || "No search results found." });
                    } catch (error) {
                        // Fallback failure catcher
                        callback({ success: false, error: "Network search lookup failed." });
                    }
                }
            });
        });
    </script>
