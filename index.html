<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Voice Assistant</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #141414; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .assistant-container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
    </style>
</head>
<body>

    <div class="assistant-container">
        <elevenlabs-convai agent-id="agent_2001krsqt8pyfqrrrfpapxfyx5hq"></elevenlabs-convai>
        <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const widget = document.querySelector("elevenlabs-convai");
            if (!widget) return;

            // Direct event integration method officially supported by ElevenLabs
            widget.addEventListener("elevenlabs-convai:call", (event) => {
                if (!event.detail || !event.detail.config) return;
                
                event.detail.config.clientTools = {
                    web_search: async (args) => {
                        const searchQuery = args.query || args;
                        try {
                            const targetUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(searchQuery)}`;
                            const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                            const htmlText = await response.text();
                            
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, 'text/html');
                            const snippets = Array.from(doc.querySelectorAll('.result__snippet'))
                                                  .slice(0, 3)
                                                  .map(el => el.textContent.trim())
                                                  .join(' ');
                            
                            return snippets || "No immediate search engine results found.";
                        } catch (error) {
                            return "Error attempting to search the live web.";
                        }
                    }
                };
            });
        });
    </script>
</body>
</html>
