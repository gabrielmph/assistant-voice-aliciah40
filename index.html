<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Voice Assistant</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #141414; display: flex; justify-content: center; align-items: center; }
        .assistant-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="assistant-container">
        <elevenlabs-convai agent-id="agent_2001krsqt8pyfqrrrfpapxfyx5hq"></elevenlabs-convai>
        <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    </div>

    <script>
        // Wait for the ElevenLabs widget element to populate on screen
        window.addEventListener('DOMContentLoaded', () => {
            const widget = document.querySelector('elevenlabs-convai');
            
            // Intercept the client tool callback when ElevenLabs requests a web search
            widget.addEventListener('elevenlabs-convai:call-tool', async (event) => {
                const { name, arguments: args, callback } = event.detail;
                
                if (name === 'web_search') {
                    const searchQuery = args.query;
                    try {
                        // Use a CORS proxy and a text search endpoint to fetch snippets
                        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://html.duckduckgo.com/html/?q=' + searchQuery)}`);
                        const data = await response.json();
                        
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(data.contents, 'text/html');
                        const snippets = Array.from(doc.querySelectorAll('.result__snippet'))
                                              .slice(0, 3)
                                              .map(el => el.textContent.trim())
                                              .join(' ');
                        
                        // Pass the live text results back up to the ElevenLabs voice stream
                        callback({ success: true, result: snippets || "No immediate search results found." });
                    } catch (error) {
                        callback({ success: false, error: "Network lookup failure." });
                    }
                }
            });
        });
    </script>
</body>
</html>
